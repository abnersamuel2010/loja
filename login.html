<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Kero - Login</title>
    <link rel="stylesheet" href="login.css">
    <link id="icon" rel="icon" href="img/kero_icon.png">
</head>

<body>
    <header>
        <div class="imagem_header">
            <div class="imagem_logo">
                <a href="index.html">
                    <img src="img/logo.png" class="logo" alt="">
                </a>
            </div>
            <div class="imagem_usuario">
                <a href="login.html">
                    <img src="img/usuario.png" class="imagem_usuario" alt="">
                </a>
            </div>
        </div>
    </header>
    <aside>

    </aside>
    <main>
        <div class="centro">
            <br>
            <div class="card">
                <div class="itens">
                    <div class="nome">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>
                    <div class="email">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="cpf">
                        <label for="cep">CPF:</label>
                        <input type="number" id="cpf" name="cpf" maxlength="14" placeholder="000.000.000-00" required>
                    </div>
                    <div class="telefone">
                        <label for="telefone">Telefone de Contato:</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="00 00000-0000" required>
                    </div>
                    <div class="cep">
                        <label for="cep">CEP:</label>
                        <input type="text" id="cep" name="cep" maxlength="9" placeholder="00000-000" required>
                    </div>
                    <div class="cidade">
                        <label for="cidade">Cidade:</label>
                        <input type="text" id="cidade" name="cidade" required>
                    </div>
                    <div class="endereco">
                        <label for="endereco">Endereço:</label>
                        <input type="text" id="endereco" name="endereco" required>
                    </div>
                    <div class="numero">
                        <label for="numero">Número</label>
                        <input type="number" id="numero" name="numero" maxlength="5" required>
                    </div>
                    <div class="senha">
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name="senha" required>
                    </div>
                    <div class="confirmarSenha"></div>
                    <br>
                    <button type="submit">Cadastrar</button>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div class="mae">
            <div class="redes_sociais">
                <h3>Redes Sociais</h3>
                <p>Instagram</p>
                <p>Facebook</p>
                <p>WhatsApp</p>
            </div>
            <div class="dados">
                <h3>Informações</h3>
                <a href="sobre.html">Sobre nós</a>
                <p>Política de Privacidade</p>
                <p>Termos de Uso</p>
                <p>Contato</p>
            </div>
            <div class="dados">
                <h3>Ajuda</h3>
                <p>Central de Atendimento</p>
                <p>Como Comprar</p>
                <p>Entrega</p>
            </div>
            <div class="dados">
                <h3>Patrocinadores</h3>
                <p>Coca-Cola</p>
                <p>Restaurante Kero</p>
            </div>
        </div>
        <div class="sla">
            <p>© 2026 Restaurante Kero - Todos os direitos reservados</p>
        </div>
    </footer>
</body>

</html>
